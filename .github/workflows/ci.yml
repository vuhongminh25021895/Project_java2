name: CI — Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        working-directory: Project_java2
        run: mvn clean install -B

      - name: Package
        working-directory: Project_java2
        run: mvn clean package -B

      - name: Checkstyle and Jacoco
        working-directory: Project_java2
        run: mvn verify -B

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: Project_java2/server/target/surefire-reports/

      - name: Upload Jacoco
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.os }}
          path: Project_java2/server/target/site/jacoco/index.html